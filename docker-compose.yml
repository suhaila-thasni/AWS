  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - hosta-network

networks:
  hosta-network:
    name: hosta-network
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
