services:
  api-gateway:
    container_name: api-gateway
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
    env_file:
      - ./api-gateway/.env
    depends_on:
      - user-service
      - ambulance-service
      - blood-service
      - blood-bank-service
      - pharmacy-service
      - staff-service
      - medicine-reminder-service
      - booking-service
      - notification-service
      - review-service
      - lab-service
      - ads-service 
      - role-service  
      - s3-service
      - bulmq-service
      - socketio-service
    networks:
      - hosta-network

  user-service:
    container_name: user-service
    build: ./user-service
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    env_file:
      - ./user-service/.env
    networks:
      - hosta-network
    depends_on:
      - rabbitmq

